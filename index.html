<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="apple-touch-icon" href="favicon.png">
    <title>Anicable Studios | Phaser</title>
    <link rel="shortcut icon" href="TemplateData/Phaser.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #unity-container {
            position: fixed;
            inset: 0;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }
                #ios-home-popup {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            padding: 20px;
        }

        .ios-home-card {
            position: relative;
            max-width: 340px;
            width: 100%;
            background: #111;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 18px;
            padding: 24px;
            text-align: center;
            font-family: Arial, sans-serif;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .ios-home-card h2 {
            margin: 0 0 12px;
            font-size: 22px;
        }

        .ios-home-card p {
            margin: 10px 0;
            font-size: 16px;
            line-height: 1.4;
        }

        #ios-home-close {
            position: absolute;
            top: 8px;
            right: 12px;
            border: none;
            background: transparent;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
</head>
<script>
function resizeCanvas() {
    const canvas = document.getElementById("unity-canvas");
    if (!canvas) return;

    const height = window.innerHeight;
    canvas.style.height = height + "px";
}

window.addEventListener("resize", resizeCanvas);
window.addEventListener("load", resizeCanvas);
function isIOS() {
    return /iPhone|iPad|iPod/i.test(navigator.userAgent)
        || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}

function isInStandaloneMode() {
    return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
}
</script>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-P5F9QEDTVM"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-P5F9QEDTVM');
</script>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
      <div id="ios-home-popup">
        <div class="ios-home-card">
          <button id="ios-home-close">×</button>
          <h2>Add Phaser to your Home Screen</h2>
          <p>For the best fullscreen experience on iPhone/iPad:</p>
          <p><strong>Tap Share</strong> → <strong>Add to Home Screen</strong></p>
        </div>
      </div>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Phaser</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      let unityGameInstance = null;
      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Phaser.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Phaser.data.unityweb",
        frameworkUrl: buildUrl + "/Phaser.framework.js.unityweb",
        codeUrl: buildUrl + "/Phaser.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Phaser",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        // var meta = document.createElement('meta');
        // meta.name = 'viewport';
        // meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        // document.getElementsByTagName('head')[0].appendChild(meta);
         document.querySelector("#unity-container").className = "unity-mobile";
         canvas.className = "unity-mobile";

        // // To lower canvas resolution on mobile devices to gain some
        // // performance, uncomment the following line:
            config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                unityGameInstance = unityInstance;
                document.querySelector("#unity-loading-bar").style.display = "none";
                if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    document.querySelector("#unity-fullscreen-button").style.display = "none";
                } else {
                    document.querySelector("#unity-fullscreen-button").onclick = () => {
                        unityInstance.SetFullscreen(1);
                    };
                }

              }).catch((message) => {
                alert(message);
              });
              
            };
            document.addEventListener("visibilitychange", () => {
    if (!unityGameInstance) return;

    try {
        if (document.hidden) {
            unityGameInstance.SendMessage("GamePauseBridge", "SetPausedFromBrowser", "1");
        } else {
            unityGameInstance.SendMessage("GamePauseBridge", "SetPausedFromBrowser", "0");
        }
    } catch (e) {}
});
      document.body.appendChild(script);
  
    </script>
  </body>
</html>
